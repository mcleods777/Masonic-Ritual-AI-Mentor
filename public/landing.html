<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Masonic Ritual Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0f19; }
    canvas { display: block; width: 100%; height: 100%; cursor: default; }
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #0b0f19; color: #c9962c; font-family: 'Cinzel', serif; font-size: 1.2rem;
      z-index: 10; transition: opacity 0.5s;
    }
    #loader.hide { opacity: 0; pointer-events: none; }
    #enter-btn {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 5; padding: 14px 36px;
      background: transparent; border: 1px solid #c9962c;
      color: #c9962c; font-family: 'Cinzel', serif; font-size: 14px;
      letter-spacing: 0.12em; cursor: pointer;
      transition: all 0.3s ease; white-space: nowrap;
    }
    @media (min-width: 600px) {
      #enter-btn { padding: 16px 48px; font-size: 16px; bottom: 40px; }
    }
    #enter-btn:hover {
      background: #c9962c; color: #1a150e;
      box-shadow: 0 0 30px rgba(201, 150, 44, 0.3);
    }
  </style>
</head>
<body>
  <div id="loader">Loading...</div>
  <canvas id="c"></canvas>
  <a id="enter-btn" href="/upload">ENTER THE LODGE</a>

  <!-- Fallback: if module script fails entirely, show static page after 5s -->
  <script>
    setTimeout(function() {
      var loader = document.getElementById('loader');
      if (loader && !loader.classList.contains('hide')) {
        loader.textContent = '';
        loader.innerHTML = '<div style="text-align:center;padding:40px"><h1 style="font-family:Cinzel,serif;color:#c9962c;margin-bottom:20px;font-size:clamp(1.5rem,4vw,2.5rem)">MASONIC RITUAL MENTOR</h1><p style="color:#c4b596;margin-bottom:30px;max-width:400px;margin-left:auto;margin-right:auto">Practice your ritual work from memory.</p><a href="/upload" style="color:#c9962c;border:1px solid #c9962c;padding:14px 36px;text-decoration:none;font-family:Cinzel,serif;letter-spacing:0.12em;font-size:14px">ENTER THE LODGE</a></div>';
      }
    }, 5000);
  </script>

  <script type="module">
    const fallback = () => {
      const loader = document.getElementById('loader');
      loader.textContent = '';
      loader.innerHTML = '<div style="text-align:center;padding:40px"><h1 style="font-family:Cinzel,serif;color:#c9962c;margin-bottom:20px;font-size:clamp(1.5rem,4vw,2.5rem)">MASONIC RITUAL MENTOR</h1><p style="color:#c4b596;margin-bottom:30px;max-width:400px;margin-left:auto;margin-right:auto">Practice your ritual work from memory. Upload your encrypted .mram file and get instant voice feedback.</p><a href="/upload" style="color:#c9962c;border:1px solid #c9962c;padding:14px 36px;text-decoration:none;font-family:Cinzel,serif;letter-spacing:0.12em;font-size:14px">ENTER THE LODGE</a></div>';
    };

    try { // ── Master try/catch for entire page ──

    const m = await import('./pretext.js');
    const prepareWithSegments = m.prepareWithSegments;
    const layoutNextLine = m.layoutNextLine;

    // ── Config: matches app theme ──
    const BG = '#0b0f19';
    const BG2 = '#070a12';
    const GOLD = '#d4a740';
    const GOLD_DIM = '#8b6914';
    const TEXT_COLOR = '#d8d4cc';
    const TEXT_DIM = '#6a655e';

    // Responsive values
    function isMobile() { return W < 600; }
    function getSymbolRadius() { return isMobile() ? 50 : 80; }
    function getLineHeight() { return isMobile() ? 28 : 36; }
    function getFontBody() {
      const size = isMobile() ? 18 : 24;
      return `${size}px "Cormorant Garamond", "Palatino Linotype", Palatino, Georgia, serif`;
    }
    function getFontHeading() {
      const size = isMobile() ? 28 : 48;
      return `bold ${size}px Cinzel, serif`;
    }

    // ── Text content ──
    const HEADING = 'MASONIC RITUAL MENTOR';
    const PARAGRAPHS = [
      `Practice your ritual work from memory. Speak your lines, hear every officer in a distinct voice, and get instant word-by-word feedback.`,

      `Seven AI voices, one for each chair. Record a brother's voice and the app clones it for his officer role.`,

      `Cipher text shown by default. Five layers of comparison catch every word you miss.`,

      `Everything stays on your device. Encrypted. Private. Built by a Mason, for Masons.`,
    ];

    // ── State ──
    let mouseX = -999, mouseY = -999;
    let symbolX = -999, symbolY = -999;
    let dpr, W, H, ctx;
    let preparedHeading;
    let preparedParagraphs = [];
    let lastPrepareWidth = 0;

    function prepareAll() {
      preparedHeading = prepareWithSegments(HEADING, getFontHeading());
      preparedParagraphs = PARAGRAPHS.map(p => prepareWithSegments(p, getFontBody()));
      lastPrepareWidth = W;
    }
    let ready = false;
    let secondarySymbols = [];
    let frameCount = 0;

    // ── Canvas setup ──
    const canvas = document.getElementById('c');
    ctx = canvas.getContext('2d');

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    resize();
    window.addEventListener('resize', () => {
      const wasMobile = isMobile();
      resize();
      // Re-prepare text if crossing mobile/desktop threshold
      if (ready && wasMobile !== isMobile()) prepareAll();
    });

    // ── Tilt / device orientation tracking ──
    let tiltX = 0, tiltY = 0; // normalised –1…+1 tilt offsets

    function enableTilt() {
      window.addEventListener('deviceorientation', (e) => {
        // gamma = left/right tilt (–90…90), beta = front/back (–180…180)
        const gamma = e.gamma || 0;
        const beta  = e.beta  || 0;
        tiltX = Math.max(-1, Math.min(1, gamma / 30)); // ±30° → full range
        tiltY = Math.max(-1, Math.min(1, (beta - 45) / 30)); // 45° = neutral hold
      });
    }

    // iOS 13+ requires permission request; others fire automatically
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      // We'll request on first user interaction (required by Safari)
      const requestTilt = () => {
        DeviceOrientationEvent.requestPermission()
          .then(state => { if (state === 'granted') enableTilt(); })
          .catch(() => {});
        window.removeEventListener('touchstart', requestTilt);
        window.removeEventListener('click', requestTilt);
      };
      window.addEventListener('touchstart', requestTilt, { once: true });
      window.addEventListener('click', requestTilt, { once: true });
    } else {
      enableTilt();
    }

    // ── Mouse / touch tracking ──
    let grabbed = false;

    // Desktop: track mouse, click to grab/release
    canvas.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
    canvas.addEventListener('click', (e) => {
      const dx = e.clientX - symbolX;
      const dy = e.clientY - symbolY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const hitR = getSymbolRadius() * 1.5;
      if (grabbed) {
        grabbed = false;
        canvas.style.cursor = 'default';
      } else if (dist < hitR) {
        grabbed = true;
        canvas.style.cursor = 'grabbing';
      }
    });

    // Mobile: touch to grab, drag to move, release to drop
    canvas.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      const dx = t.clientX - symbolX;
      const dy = t.clientY - symbolY;
      const hitR = getSymbolRadius() * 1.8;
      if (Math.sqrt(dx * dx + dy * dy) < hitR) {
        grabbed = true;
        mouseX = t.clientX;
        mouseY = t.clientY;
        e.preventDefault();
      }
    }, { passive: false });
    canvas.addEventListener('touchmove', (e) => {
      if (!grabbed) return;
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', () => {
      if (grabbed) {
        grabbed = false;
        mouseX = -999;
        mouseY = -999;
      }
    });

    // ── Secondary floating symbols ──
    function initSecondarySymbols() {
      secondarySymbols = [
        { x: W * 0.2, y: H * 0.3, vx: 0.3, vy: 0.2, r: 35, type: 'eye' },
        { x: W * 0.8, y: H * 0.7, vx: -0.25, vy: 0.3, r: 30, type: 'trowel' },
        { x: W * 0.5, y: H * 0.8, vx: 0.2, vy: -0.35, r: 28, type: 'pillar' },
      ];
    }
    initSecondarySymbols();

    function updateSecondarySymbols() {
      for (const s of secondarySymbols) {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < s.r || s.x > W - s.r) s.vx *= -1;
        if (s.y < s.r || s.y > H - s.r) s.vy *= -1;
      }
    }

    // ── Draw square & compass symbol ──
    function drawSquareAndCompass(cx, cy, size, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalAlpha = alpha;

      const s = size / 80;

      // Ancient warm glow
      ctx.shadowColor = '#d4a030';
      ctx.shadowBlur = 40 * s;

      ctx.strokeStyle = GOLD;
      ctx.lineWidth = 2.5 * s;
      ctx.lineCap = 'round';

      // Compass (V shape opening upward)
      ctx.beginPath();
      ctx.moveTo(-30 * s, 35 * s);
      ctx.lineTo(0, -40 * s);
      ctx.lineTo(30 * s, 35 * s);
      ctx.stroke();

      // Square (inverted V below)
      ctx.beginPath();
      ctx.moveTo(-35 * s, -15 * s);
      ctx.lineTo(0, 30 * s);
      ctx.lineTo(35 * s, -15 * s);
      ctx.stroke();

      // G in center
      ctx.shadowBlur = 0;
      ctx.font = `bold ${22 * s}px Cinzel, serif`;
      ctx.fillStyle = GOLD;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('G', 0, 2 * s);

      // Circle around
      ctx.beginPath();
      ctx.arc(0, 0, 50 * s, 0, Math.PI * 2);
      ctx.strokeStyle = GOLD_DIM;
      ctx.lineWidth = 1 * s;
      ctx.globalAlpha = alpha * 0.4;
      ctx.stroke();

      ctx.restore();
    }

    // ── Draw secondary symbols ──
    function drawEye(cx, cy, size, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalAlpha = alpha * 0.5;
      ctx.strokeStyle = GOLD_DIM;
      ctx.lineWidth = 1.5;

      // Eye shape
      ctx.beginPath();
      ctx.moveTo(-size, 0);
      ctx.quadraticCurveTo(0, -size * 0.8, size, 0);
      ctx.quadraticCurveTo(0, size * 0.8, -size, 0);
      ctx.stroke();

      // Pupil
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.3, 0, Math.PI * 2);
      ctx.stroke();

      ctx.restore();
    }

    function drawTrowel(cx, cy, size, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalAlpha = alpha * 0.4;
      ctx.strokeStyle = GOLD_DIM;
      ctx.lineWidth = 1.5;

      // Triangle blade
      ctx.beginPath();
      ctx.moveTo(0, -size);
      ctx.lineTo(-size * 0.5, size * 0.3);
      ctx.lineTo(size * 0.5, size * 0.3);
      ctx.closePath();
      ctx.stroke();

      // Handle
      ctx.beginPath();
      ctx.moveTo(0, size * 0.3);
      ctx.lineTo(0, size);
      ctx.stroke();

      ctx.restore();
    }

    function drawPillar(cx, cy, size, alpha) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.globalAlpha = alpha * 0.4;
      ctx.strokeStyle = GOLD_DIM;
      ctx.lineWidth = 1.5;

      // Column
      ctx.strokeRect(-size * 0.25, -size, size * 0.5, size * 2);
      // Capital
      ctx.strokeRect(-size * 0.35, -size, size * 0.7, size * 0.2);
      // Base
      ctx.strokeRect(-size * 0.35, size * 0.8, size * 0.7, size * 0.2);

      ctx.restore();
    }

    function drawSecondarySymbol(s) {
      if (s.type === 'eye') drawEye(s.x, s.y, s.r, 1);
      else if (s.type === 'trowel') drawTrowel(s.x, s.y, s.r, 1);
      else if (s.type === 'pillar') drawPillar(s.x, s.y, s.r, 1);
    }

    // ── Pillars: Jachin (right) & Boaz (left) ──
    function drawPillars() {
      const pillarW = Math.max(28, W * 0.025);
      const capH = pillarW * 1.2;
      const baseH = pillarW * 0.8;
      const flute = pillarW * 0.15;
      const leftX = pillarW * 0.8;
      const rightX = W - pillarW * 0.8;
      const topY = 0;
      const botY = H;

      ctx.save();

      for (const cx of [leftX, rightX]) {
        const isLeft = cx < W / 2;

        // Column shaft with fluting
        ctx.globalAlpha = 0.12;
        ctx.fillStyle = GOLD_DIM;
        ctx.fillRect(cx - pillarW / 2, topY + capH, pillarW, botY - capH - baseH);

        // Fluting lines (vertical grooves)
        ctx.globalAlpha = 0.06;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 1;
        for (let i = 0; i < 4; i++) {
          const fx = cx - pillarW / 2 + flute + i * (pillarW - flute * 2) / 3;
          ctx.beginPath();
          ctx.moveTo(fx, topY + capH + 10);
          ctx.lineTo(fx, botY - baseH - 10);
          ctx.stroke();
        }

        // Capital (top ornament)
        ctx.globalAlpha = 0.18;
        ctx.fillStyle = GOLD;
        // Main capital block
        ctx.fillRect(cx - pillarW * 0.7, topY, pillarW * 1.4, capH * 0.3);
        // Echinus (curved part)
        ctx.fillRect(cx - pillarW * 0.6, topY + capH * 0.3, pillarW * 1.2, capH * 0.35);
        // Necking
        ctx.fillRect(cx - pillarW * 0.5, topY + capH * 0.65, pillarW, capH * 0.35);

        // Base
        ctx.globalAlpha = 0.15;
        ctx.fillStyle = GOLD;
        ctx.fillRect(cx - pillarW * 0.7, botY - baseH, pillarW * 1.4, baseH * 0.3);
        ctx.fillRect(cx - pillarW * 0.6, botY - baseH * 0.7, pillarW * 1.2, baseH * 0.7);

        // Pillar letter: B (left/Boaz) and J (right/Jachin)
        ctx.globalAlpha = 0.2;
        ctx.font = `bold ${pillarW * 0.8}px Cinzel, serif`;
        ctx.fillStyle = GOLD;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(isLeft ? 'B' : 'J', cx, topY + capH + 40);

        // Subtle glow line along edge
        ctx.globalAlpha = 0.05;
        ctx.strokeStyle = GOLD;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cx + (isLeft ? pillarW / 2 : -pillarW / 2), topY + capH);
        ctx.lineTo(cx + (isLeft ? pillarW / 2 : -pillarW / 2), botY - baseH);
        ctx.stroke();
      }

      ctx.restore();
    }

    // ── Collision: compute exclusion intervals for a line band ──
    function getExclusions(lineTop, lineBottom, obstacles) {
      const intervals = [];
      for (const ob of obstacles) {
        const dy1 = Math.abs(ob.y - lineTop);
        const dy2 = Math.abs(ob.y - lineBottom);
        const dy = Math.min(dy1, dy2, Math.abs(ob.y - (lineTop + lineBottom) / 2));
        if (dy < ob.r) {
          const half = Math.sqrt(ob.r * ob.r - dy * dy);
          intervals.push([ob.x - half, ob.x + half]);
        }
      }
      // Merge overlapping
      intervals.sort((a, b) => a[0] - b[0]);
      const merged = [];
      for (const iv of intervals) {
        if (merged.length && iv[0] <= merged[merged.length - 1][1]) {
          merged[merged.length - 1][1] = Math.max(merged[merged.length - 1][1], iv[1]);
        } else {
          merged.push([...iv]);
        }
      }
      return merged;
    }

    // ── Carve slots from a line, given exclusions ──
    function carveSlots(lineLeft, lineRight, exclusions) {
      const slots = [];
      let left = lineLeft;
      for (const [exL, exR] of exclusions) {
        if (exL > left) slots.push({ x: left, w: exL - left });
        left = Math.max(left, exR);
      }
      if (left < lineRight) slots.push({ x: left, w: lineRight - left });
      return slots;
    }

    // ── Render text with reflow ──
    function renderText(prepared, font, color, startX, startY, maxWidth, lineH, obstacles) {
      ctx.font = font;
      ctx.fillStyle = color;
      ctx.textBaseline = 'top';

      let state = { segmentIndex: 0, graphemeIndex: 0 };
      let y = startY;
      let done = false;
      const endY = H + lineH;
      const leftEdge = startX;
      const rightEdge = startX + maxWidth;
      const MIN_SLOT = W < 600 ? 60 : 100;

      while (y < endY && !done) {
        const exclusions = getExclusions(y, y + lineH, obstacles);
        const slots = carveSlots(leftEdge, rightEdge, exclusions);
        const usableSlots = slots.filter(s => s.w >= MIN_SLOT);

        if (usableSlots.length === 0) {
          y += lineH;
          continue;
        }

        for (const slot of usableSlots) {
          try {
            const result = layoutNextLine(prepared, state, slot.w);
            if (!result) { done = true; break; }
            state = result.end;
            ctx.fillText(result.text.trimEnd(), slot.x, y);
          } catch {
            // Skip this slot, try the next one
          }
        }

        y += lineH;
      }
      return y;
    }

    // ── Init Pretext ──
    async function init() {
      const loader = document.getElementById('loader');
      try {
        await Promise.race([
          document.fonts.ready,
          new Promise(r => setTimeout(r, 3000)),
        ]);
      } catch { /* proceed with system fonts */ }

      try {
        prepareAll();
        ready = true;
        loader.classList.add('hide');
      } catch (err) {
        console.error('Landing page init failed:', err);
        fallback();
      }
    }

    // ── Main render loop ──
    function render() {
      try {
      frameCount++;
      if (!ready) { requestAnimationFrame(render); return; }

      // Symbol movement: drift by default, follow cursor only when grabbed
      const mobile = isMobile();
      let targetX, targetY;
      if (grabbed && mouseX > 0) {
        targetX = mouseX;
        targetY = mouseY;
      } else {
        // Gentle drift path (smaller orbit on mobile)
        const orbitX = mobile ? W * 0.15 : W * 0.22;
        const orbitY = mobile ? H * 0.12 : H * 0.18;
        targetX = W / 2 + Math.sin(frameCount * 0.008) * orbitX;
        targetY = H * 0.35 + Math.cos(frameCount * 0.006) * orbitY;

        // Layer phone tilt on top of the drift orbit
        const tiltRange = mobile ? W * 0.18 : W * 0.12;
        targetX += tiltX * tiltRange;
        targetY += tiltY * tiltRange;
      }
      const ease = grabbed ? 0.12 : 0.02;
      symbolX += (targetX - symbolX) * ease;
      symbolY += (targetY - symbolY) * ease;

      updateSecondarySymbols();

      // Clear with parchment gradient
      const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W, H) * 0.7);
      grad.addColorStop(0, BG);
      grad.addColorStop(1, BG2);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // Subtle noise/grain texture (aged paper feel)
      if (frameCount === 1 || frameCount % 120 === 0) {
        ctx.save();
        ctx.globalAlpha = 0.03;
        for (let i = 0; i < 200; i++) {
          const x = Math.random() * W;
          const y = Math.random() * H;
          const s = Math.random() * 2 + 0.5;
          ctx.fillStyle = Math.random() > 0.5 ? '#d4c4a0' : '#0a0800';
          ctx.fillRect(x, y, s, s);
        }
        ctx.restore();
      }

      // Vignette (darker edges like an old scroll)
      const vig = ctx.createRadialGradient(W/2, H/2, Math.min(W, H) * 0.3, W/2, H/2, Math.max(W, H) * 0.7);
      vig.addColorStop(0, 'rgba(0,0,0,0)');
      vig.addColorStop(1, 'rgba(0,0,0,0.4)');
      ctx.fillStyle = vig;
      ctx.fillRect(0, 0, W, H);

      // ── Pillars (Jachin & Boaz) ──
      drawPillars();

      // Responsive values
      const symR = getSymbolRadius();
      const lineH = getLineHeight();
      const fontBody = getFontBody();
      const fontHeading = getFontHeading();

      // Build obstacle list (smaller symbols on mobile)
      const obstacles = [
        { x: symbolX, y: symbolY, r: symR },
      ];
      // Only add secondary symbols on desktop
      if (!mobile) {
        for (const s of secondarySymbols) {
          obstacles.push({ x: s.x, y: s.y, r: s.r + 10 });
        }
      }

      // Layout
      const pad = mobile ? 16 : Math.max(60, W * 0.08);
      const maxW = Math.min(W - pad * 2, 800);
      const startX = (W - maxW) / 2;

      // On mobile, start near top. On desktop, center vertically.
      const topY = mobile ? 40 : Math.max(H * 0.25, 80);

      // Render heading — centered on mobile via canvas textAlign
      const headingLineH = mobile ? 34 : 60;
      if (mobile) {
        // Draw heading centered, above the Pretext body text
        ctx.font = fontHeading;
        ctx.fillStyle = GOLD;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(HEADING, W / 2, topY);
        ctx.textAlign = 'left';
        var curY = topY + headingLineH + 8;
      } else {
        var curY = renderText(preparedHeading, fontHeading, GOLD, startX, topY, maxW, headingLineH, obstacles);
      }

      // Render body
      const PARA_GAP = mobile ? 16 : 24;
      for (const prepared of preparedParagraphs) {
        curY += PARA_GAP;
        curY = renderText(prepared, fontBody, TEXT_COLOR, startX, curY, maxW, lineH, obstacles);
        if (curY > H - 100) break;
      }

      // Draw symbols on top
      drawSquareAndCompass(symbolX, symbolY, symR, 0.9);
      if (!mobile) {
        for (const s of secondarySymbols) drawSecondarySymbol(s);
      }

      // (CTA is an HTML overlay button now)

      requestAnimationFrame(render);
      } catch (e) {
        // Render error, skip this frame but keep the loop alive
        console.warn('render error:', e.message);
        requestAnimationFrame(render);
      }
    }

    await init();
    requestAnimationFrame(render);

    } catch (err) { // ── Master catch ──
      console.error('Landing page error:', err);
      fallback();
    }
  </script>
</body>
</html>
